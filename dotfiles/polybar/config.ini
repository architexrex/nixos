
[colors]
white = #FFFFFF
whiteYellow = #FFFEE5

blue0 = #7489D4
blue1 = #394887
blue2 = #243373
blue3 = #121C52
blue4 = #08103B
blue5 = #000829

blueGrey = #1D1B29

grey5 = #424242

black4 = #1C1C1C
black5 = #000000

foreg = #000000
[bar/main]
width = 100%
height = 25
offset-x = 0
offset-y = 0
bottom = true
#SQUARE CORNERS
radius = 10


#I3 STUFF
override-redirect = false
wm-restack = i3

#############################################
#		EXTERIOR PADDING	    #
#############################################
border-top-size = 0
border-bottom-size = 4 
border-left-size = 450
border-right-size = 450

background = ${colors.blueGrey}
foreground = ${colors.foreg}

line-size = 10

#padding-left = 20
#padding-right = 20

module-margin = 2

font-0 = FiraMono Nerd Font 13

fixed-center = true

#modules-left = moduleHere
modules-center = date

[settings]
screenchange-reload = true
pseudo-transparency = false

[module/date]
type = internal/date
interval = 50
date = %H:%M

LABEL = %date%

format = <label>

format-background = ${colors.blue4}
format-foreground = ${colors.whiteYellow}
#TO ADJUST BACKGROUND WIDTH
format-padding = 10

offset-x = 10%
offset-y = 50
format-radius = 6



[module/cpu]
type = internal/cpu
interval = 10
label = CPU %percentage%%

[module/memory]
type = internal/memory
interval = 10
